  {
    type: "overview",
    badge: { text:"Full Model", bg:"#334155", color:"#CBD5E1" },
    accent: "#475569",
    title: "The Complete System",
    subtitle: "Energy Blindness — The Great Carbon Pulse",
    heading: "The Single Highest-Leverage Point",
    description: `<p>The complete model shows a civilisation built on a one-time inheritance of ancient sunlight — now facing the physical limits of that inheritance.</p>
<p>Of all the nodes in this system, <strong>Energy Literacy</strong> is the most powerful. It is the only intervention that breaks the self-sealing Blindness–Debt loop (R4), enables the choice of Managed Simplification, and opens the door to Ancient Satisfactions that require no barrel of oil.</p>
<p><em>"If we remain energy blind and try to solve this with money and tech only, it's going to be chaotic, unequal, and devastating. The first step is simply seeing it."</em></p>`,
    activeNodeIds: null,
    activeEdgeIds: null,
  },
];

// ─────────────────────────────────────────────
//  VIS-NETWORK INIT
// ─────────────────────────────────────────────
const nodeLabel = Object.fromEntries(nodesArray.map(n => [n.id, n.label.replace(/\n/g,' ')]));
const nodeColor = Object.fromEntries(nodesArray.map(n => [n.id, n.color]));
const edgeColorOrig = Object.fromEntries(edgesData.map(e => [e.id, e.color.color]));
const edgeWidthOrig = Object.fromEntries(edgesData.map(e => [e.id, e.width || 2]));

const nodes = new vis.DataSet(nodesArray.map(n => ({ ...n })));
const edges = new vis.DataSet(edgesData.map(e => ({
    ...e,
    smooth: { enabled: true, type: "cubicBezier", roundness: 0.3 },
    font: { align:'middle', size:11, face:'Inter,sans-serif', color:'#374151', background:'rgba(255,255,255,0.8)', strokeWidth:0 }
})));

const container = document.getElementById('network');
const network = new vis.Network(container, { nodes, edges }, {
    autoResize: true,
    height: '100%', width: '100%',
    nodes: {
        shape: 'ellipse', size: 25,
        font: { size:13, face:'Inter,sans-serif', color:'#1F2937', multi:'html' },
        widthConstraint: { maximum: 160 },
        borderWidth: 2,
        shadow: { enabled: true, size:4, x:2, y:2, color:'rgba(0,0,0,0.08)' },
    },
    edges: {
        width: 2.5,
        arrows: { to: { enabled:true, scaleFactor:0.65, type:'arrow' } },
    },
    physics: { enabled: false },
    interaction: {
        hover: false, dragNodes: false, dragView: true, zoomView: true,
        selectable: false, navigationButtons: false,
    },
    layout: { hierarchical: false },
});

// ─────────────────────────────────────────────
//  SLIDE ENGINE
// ─────────────────────────────────────────────
let currentIdx = 0;

function buildDots() {
    const container = document.getElementById('nav-dots');
    container.innerHTML = '';
    SLIDES.forEach((s, i) => {
        const dot = document.createElement('div');
        dot.className = 'nav-dot ' + s.type;
        dot.title = s.title;
        dot.addEventListener('click', () => goTo(i));
        container.appendChild(dot);
    });
}

function updateDots(idx) {
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
    });
}

function updateSlideUI(slide, idx) {
    // Header
    const badge = document.getElementById('slide-badge');
    badge.textContent = slide.badge.text;
    badge.style.background = slide.badge.bg;
    badge.style.color = slide.badge.color;
    document.getElementById('slide-title').textContent = slide.title;
    document.getElementById('slide-subtitle').textContent = slide.subtitle;
    document.getElementById('slide-counter').textContent = `${idx + 1} / ${SLIDES.length}`;

    // Accent bar
    document.getElementById('panel-accent-bar').style.background = slide.accent;

    // Loop label
    const loopLabel = document.getElementById('panel-loop-label');
    if (slide.type === 'r-loop') {
        loopLabel.textContent = 'Reinforcing Loop — Amplifying';
        loopLabel.style.color = '#F59E0B';
    } else if (slide.type === 'b-loop') {
        loopLabel.textContent = 'Balancing Loop — Limiting';
        loopLabel.style.color = '#60A5FA';
    } else if (slide.type === 'archetype') {
        loopLabel.textContent = 'System Archetype';
        loopLabel.style.color = '#A78BFA';
    } else {
        loopLabel.textContent = 'Causal Loop Diagram';
        loopLabel.style.color = '#64748B';
    }

    document.getElementById('panel-heading').textContent = slide.heading;
    document.getElementById('panel-description').innerHTML = slide.description;

    // Nodes section
    const nodesSection = document.getElementById('panel-nodes');
    const nodesList = document.getElementById('panel-nodes-list');
    if (slide.activeNodeIds && slide.activeNodeIds.length > 0) {
        nodesSection.style.display = 'block';
        nodesList.innerHTML = slide.activeNodeIds.map(id => {
            const bg = nodeColor[id]?.background || '#DBEAFE';
            const label = nodeLabel[id] || id;
            return `<span class="node-pill" style="background:${bg}">${label}</span>`;
        }).join('');
    } else {
        nodesSection.style.display = 'none';
    }

    // Nav buttons
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === SLIDES.length - 1;

    // Scroll panel back to top
    document.getElementById('panel-content').scrollTop = 0;

    updateDots(idx);
}

function updateNetworkHighlighting(slide) {
    const activeN = slide.activeNodeIds;
    const activeE = slide.activeEdgeIds;

    const nodeUpdates = nodesArray.map(n => {
        const active = activeN === null || activeN.includes(n.id);
        return {
            id: n.id,
            color: active ? nodeColor[n.id] : DIM_NODE,
            font: { size:13, face:'Inter,sans-serif', color: active ? '#1F2937' : DIM_FONT.color },
            borderWidth: active ? 2 : 1,
        };
    });

    const edgeUpdates = edgesData.map(e => {
        const active = activeE === null || activeE.includes(e.id);
        return {
            id: e.id,
            color: { color: active ? edgeColorOrig[e.id] : DIM_EDGE_COLOR },
            width: active ? edgeWidthOrig[e.id] : 0.8,
            font: {
                align:'middle', size:11, face:'Inter,sans-serif',
                color: active ? '#374151' : '#D1D5DB',
                background: active ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0)',
                strokeWidth:0,
            },
        };
    });

    nodes.update(nodeUpdates);
    edges.update(edgeUpdates);
}

function fitCamera(slide, animate) {
    const anim = animate ? { duration: 700, easingFunction: 'easeInOutQuad' } : false;
    if (slide.activeNodeIds === null) {
        network.fit({ animation: anim });
    } else {
        network.fit({ nodes: slide.activeNodeIds, animation: anim });
    }
}

function goTo(idx, animate = true) {
    if (idx < 0 || idx >= SLIDES.length) return;
    currentIdx = idx;
    const slide = SLIDES[idx];
    updateSlideUI(slide, idx);
    updateNetworkHighlighting(slide);
    fitCamera(slide, animate);
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
buildDots();
setTimeout(() => goTo(0, false), 60);

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => goTo(currentIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(currentIdx + 1));

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    goTo(currentIdx - 1);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
        e.preventDefault();
        goTo(currentIdx + 1);
    }
});

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) goTo(dx < 0 ? currentIdx + 1 : currentIdx - 1);
});
</script>
</body>
</html>
